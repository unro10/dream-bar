<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Bar</title>

<link rel="stylesheet" href="st.css">
</head>
<body>

<div class="background"></div>

<div class="brown-shadow"></div>

<div class="container">

    <header class="header">
        <h1>Dream Bar</h1>
        <p>현실과 꿈의 경계에서</p>
    </header>

    <main id="chat-box">

        <div class="message ai">
브라운이 잔을 닦으며 당신을 바라본다.

"오, 친구!

당신을 기다리고 있었답니다.

오늘은 무슨 일이 있었습니까?

좋은 일이든,
슬픈 일이든,

이 Dream Bar에서는 모두 환영입니다.

자, 편히 앉으시지요."
        </div>

    </main>

    <footer>

        <div class="input-area">

            <input
                id="user-input"
                type="text"
                autocomplete="off"
                placeholder="브라운에게 이야기를 건네보세요..."
            >

            <button id="send-btn">
                보내기
            </button>

        </div>

        <div id="status-bar">
            브라운이 조용히 잔을 닦고 있다.
        </div>

    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
